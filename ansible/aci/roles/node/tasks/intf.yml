---
# Copy of roles/fabric/tasks/intf_selector.yml (same logic, applied per-node
# via node.interfaces instead of per-profile via leaf_interface_profiles).
# Keep both in sync when changing one.
- name: Process AAEP
  include_tasks: wrapper_api_call.yml

  vars:
    intf_from_port: "{{ intf.from_port | default(intf.port) }}"
    intf_to_port: "{{ intf.to_port | default(intf.port) }}"
    intf_name: >-
      {{ intf.selector_name if intf.selector_name is defined else
         'eth' ~ intf.card ~ '_' ~ intf_from_port ~ ('-' ~ intf_to_port if intf_to_port != intf_from_port else '') }}
    ipg_type: "{{  ipg_to_type_map[ intf.intf_pol_group ][ 'ipg_type'] }}"
    intf_prof: "{{ node.vpc_intf_profile if ipg_to_type_map[ intf.intf_pol_group ]['lag_type'] == 'vpc' else node.intf_profile }}"
    path: "/api/mo/uni/infra/accportprof-{{ intf_prof }}/hports-{{ intf_name }}-typ-range.json"
    payload: "{{ lookup('template', 'intf_selector.json.j2') }}"
    dn: "/api/mo/uni/infra/accportprof-{{ intf_prof }}/hports-{{ intf_name }}-typ-range"

  loop: "{{ node.interfaces | default([]) }}"
  loop_control:
    loop_var: intf
    label: "{{ [ node.name, intf.intf_pol_group ] | join('/') }}"

  when:
    - intf | has_nested_state

  no_log: true
